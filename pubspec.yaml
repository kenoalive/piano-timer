name: practice_timer
description: "乐器练习记录APP - 记录练琴时长，上传练习视频，云端自动同步"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 状态管理
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # 本地存储
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # 腾讯云 CloudBase
  # 注意：这些包可能需要从 GitHub 或其他源安装

  # 视频/图片
  video_player: ^2.8.2
  chewie: 1.5.0
  image_picker: ^1.0.7
  video_thumbnail: ^0.5.3
  video_compress: ^3.1.2

  # 图表
  fl_chart: ^0.66.2

  # 网络状态
  connectivity_plus: ^5.0.2

  # 时间处理
  intl: ^0.19.0

  # 工具
  uuid: ^4.3.3
  path: ^1.9.0
  permission_handler: ^11.3.0
  crypto: ^3.0.3

  # UI 优化
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
